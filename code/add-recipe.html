<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Recipe | Community Cookbook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #fdfbf7;">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="index.html">COMMUNITY COOK</a>
            <div class="collapse navbar-collapse"><ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="recipes.html">Recipes</a></li>
            </ul></div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 bg-white p-5 shadow-sm rounded">
                <h3 class="fw-bold text-center mb-4">Share Your Secret Recipe</h3>
                <form>
                    <div class="mb-3"><label class="form-label">Dish Name</label><input type="text" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Ingredients</label><textarea class="form-control" rows="3"></textarea></div>
                    <div class="mb-3"><label class="form-label">Step-by-Step Method</label><textarea class="form-control" rows="3"></textarea></div>
                    <button type="button" class="btn btn-danger w-100" onclick="alert('Success! Your recipe has been added to the community database.')">Publish Recipe</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
