<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20+ Recipes | Community Cookbook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fdfbf7; font-family: 'Poppins', sans-serif; }
        .recipe-card { border: none; border-radius: 15px; transition: 0.3s; margin-bottom: 20px; }
        .recipe-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .recipe-img { height: 180px; object-fit: cover; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="index.html">COMMUNITY COOK</a>
            <div class="collapse navbar-collapse"><ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="recipes.html">Recipes</a></li>
                <li class="nav-item"><a class="nav-link" href="add-recipe.html">Add Recipe</a></li>
            </ul></div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="fw-bold mb-4">Explore 20 Community Favorites</h2>
        <div class="row" id="recipe-grid">
            <script>
                const recipes = [
                    {title: "Quinoa Bowl", user: "Sarah"}, {title: "Margherita Pizza", user: "Chef_J"},
                    {title: "Garlic Pasta", user: "Maria"}, {title: "Chocolate Cake", user: "BakeMaster"},
                    {title: "Chicken Curry", user: "Sanam"}, {title: "Greek Salad", user: "Alex"},
                    {title: "Sushi Rolls", user: "Yuki"}, {title: "Tacos", user: "Carlos"},
                    {title: "Pancakes", user: "Emma"}, {title: "Steak & Veg", user: "Robert"},
                    {title: "Fruit Smoothie", user: "Lisa"}, {title: "Beef Burger", user: "Sam"},
                    {title: "Apple Pie", user: "Granny"}, {title: "Lasagna", user: "Luigi"},
                    {title: "Tomato Soup", user: "Chef_V"}, {title: "Club Sandwich", user: "Diner_Joe"},
                    {title: "Egg Fried Rice", user: "Lee"}, {title: "Mutton Biryani", user: "Ayaan"},
                    {title: "Fish & Chips", user: "Will"}, {title: "Ice Cream", user: "Scoops"}
                ];

                let html = "";
                recipes.forEach(r => {
                    html += `
                    <div class="col-lg-3 col-md-4 col-sm-6">
                        <div class="card recipe-card shadow-sm">
                            <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=400" class="recipe-img" alt="Food">
                            <div class="card-body">
                                <h6 class="fw-bold">${r.title}</h6>
                                <p class="text-muted small">Contributed by: ${r.user}</p>
                                <button class="btn btn-sm btn-danger w-100">View Recipe</button>
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById('recipe-grid').innerHTML = html;
            </script>
        </div>
    </div>
</body>
</html>
